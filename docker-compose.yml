version: '3.8'

services:

  # Base de datos MySQL
  db:
    image: mysql:8.0
    container_name: db_eventos
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: promotions_db
    ports:
      - "3307:3306"
    volumes:
      # Guarda los datos aunque el contenedor se reinicie
      - db_data:/var/lib/mysql
      # Ejecuta el SQL al iniciar por primera vez
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql

  # Backend Node.js
  backend:
    build: ./backend
    container_name: backend_eventos
    restart: always
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root1234
      DB_NAME: promotions_db
    depends_on:
      - db

  # Frontend React
  frontend:
    build: ./frontend
    container_name: frontend_eventos
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
      
volumes:
  db_data: